contract:
  description: "Legal agreements, employment contracts, and terms of service."
  identification_rules:
    - "Act as the eyes of the system: Look for explicit contract language (e.g., 'عقد' or 'Agreement'), numbered legal clauses, terms and conditions, and multiple signature blocks at the end indicating a binding agreement between two or more parties."
  extract:
    - "content_explanation: Act like the eyes of the system. First, provide a highly detailed, comprehensive explanation of all the contents within the document. Focus on reading and summarizing the text, the overall purpose of the document, the data presented, and the context, rather than just describing the visual layout."

