pictures:
  description: "Standalone photographs, images without significant text, or attachments that are purely visual."
  identification_rules:
    - "Act as the eyes of the system: Confirm the document is primarily an image or photograph with little to no structured text."
  extract:
    - "content_explanation: Act like the eyes of the system. First, provide a highly detailed, comprehensive explanation of all the contents within the document. Focus on reading and summarizing the text, the overall purpose of the document, the data presented, and the context, rather than just describing the visual layout."
    - "image_contents: Describe the core subject matter of the photograph or image."
    - "expected_tenant_name: The person living in or responsible for the house during this document's timeline. E.g., for letters, if it mentions someone living in the current house. For forms, the person it is filled about. For utility bills, the person associated. IMPORTANT: Not every document will have a tenant name. Do not force an extraction. If you cannot find them, return null."
    - "expected_house_number: The house number associated with the expected tenant or mentioned in the document. IMPORTANT: Not every document will have a house number. Do not force an extraction. If you cannot find them, return null."

letters:
  description: "Formal correspondence, memos, and official communications."
  identification_rules:
    - "Act as the eyes of the system: Look for the 'Kingdom of Bahrain Ministry of Interior' (or 'وزارة الداخلية') in the header with a logo."
    - "CRITICAL RULE: Anything from the 'Office of the Undersecretary' (مكتب وكيل الوزارة) is ALWAYS a letter."
  extract:
    - "content_explanation: Act like the eyes of the system. First, provide a highly detailed, comprehensive explanation of all the contents within the document. Focus on reading and summarizing the text, the overall purpose of the document, the data presented, and the context, rather than just describing the visual layout."
    - "sender: Extract the full name, title, and department of the sender."
    - "receiver: Extract the full name, title, and department of the recipient."
    - "subject: Extract the subject line (الموضوع) or main purpose of the letter."
    - "date: Extract the date the letter was issued."
    - "expected_tenant_name: The person living in or responsible for the house during this document's timeline. E.g., for letters, if it mentions someone living in the current house. For forms, the person it is filled about. For utility bills, the person associated. IMPORTANT: Not every document will have a tenant name. Do not force an extraction. If you cannot find them, return null."
    - "expected_house_number: The house number associated with the expected tenant or mentioned in the document. IMPORTANT: Not every document will have a house number. Do not force an extraction. If you cannot find them, return null."

