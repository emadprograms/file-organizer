categories:
  - id: BASIC_DETAILS
    name: "Basic Details Form"
    description: "Strictly forms about the person. If the page is a FORM with boxes, tables, or fill-in-the-blanks for a person's name/ID/details, you MUST choose this. FORMS ARE NEVER Allocation Order."
  - id: PERSONAL_DETAILS
    name: "Personal Identification"
    description: "Pictures of identity cards, passports, and other non-form documents related to the person and his family. Anything related to the person and his family that is NOT a form goes here."
  - id: AMAR_TAKHSEES
    name: "Allocation Order"
    description: "STRICT DEFINITION: A letter from a higher authority ordering to give a place to stay. FORMS OR TABLES ARE NEVER THIS. It MUST be a letter paragraph format. Strong pattern: Exact subject 'الموضوع : الوحدات السكنية' AND format is a letter."
  - id: KEY_HANDOVER
    name: "Key Handover Certificate"
    description: "Key handover/receipt forms. Strong pattern: Contains 'استمارة تسليم الوحدات السكنية التابعة لوزارة الداخلية'."
  - id: CONTRACT
    name: "Housing Contract"
    description: "Rental or housing contracts."
  - id: EWA_LETTERS
    name: "Electricity and Water"
    description: "EWA electricity/water letters. Strong pattern: Contains a meter number, such as 'الوحدة السكنية رقم' or similar."
  - id: RENT_DEDUCTION
    name: "Rent Deduction Notice"
    description: "Rent deduction notices or records. STRICT DEFINITION: Rent deduction letters will ALWAYS contain '30 bd' or '60 bd'. Use this presence/absence to strictly disambiguate from Allowance Deduction."
  - id: ALLOWANCE_DEDUCTION
    name: "Allowance Deduction Notice"
    description: "Allowance deduction notices. Strong pattern: Subject is 'الموضوع: وقف استقطاع بدل الانتفاع'. Will NOT have '30 bd' or '60 bd' written on it."
  - id: NOTIFICATIONS
    name: "General Notifications"
    description: "General notifications, warnings, and home eviction notices. Strong pattern: Contains the word 'إشعار' or 'اشعار'. Home eviction notices MUST go here and NOT in Miscellaneous Letters. Do NOT use this for allocation orders."
  - id: MAINTENANCE
    name: "Maintenance Records"
    description: "Maintenance requests, reports, work orders. Strong pattern: Sender or receiver is 'إدارة الأشغال' (idara ashgal), or it is a yellow paper with inspection details, or ANY mention of 'inspection' goes to maintenance."
  - id: INSPECTION_PICTURES
    name: "Inspection and Pictures"
    description: "Photographs of the property or inspection pictures."
  - id: MODIFICATIONS
    name: "Property Modifications"
    description: "Modification requests or approvals. Strong pattern: Subject contains 'طلب' (talab) and mentions modifying the house."
  - id: OTHER_LETTERS
    name: "Miscellaneous Letters"
    description: "Any letters that don't fit the above."

extraction:
  prompt_template: >
    You are an Arabic document classification expert analyzing scanned housing files from the Bahrain/Gulf region.
    Read the page directly using your vision capabilities and classify it.
    
    CRITICAL FIRST STEP: ALWAYS analyze the subject (الموضوع) of the letter or document first before looking at the body text.
    
    NAME EXTRACTION RULES (CRITICAL):
    - Arabic names typically have 4 to 5 parts. Extract ALL parts of the name.
    - If a document states a person's relationship (e.g., Wife - زوجة, Son - ابن), append it to their name in parentheses, e.g., "آمنة (زوجة)".
    - If a document is addressed to MULTIPLE people, extract ALL of their names as a list of strings.
    - Do NOT return an empty list or ["NONE"] unless you are absolutely certain there is no name anywhere on the page. Most documents DO contain a name.
    - Only return ["NONE"] for categories where no resident is expected: Allocation Order, Inspection and Pictures, or Miscellaneous Letters with no addressee.
    
    DATE EXTRACTION RULES:
    - Find any visible date on the document.
    - Normalize the date to YYYY-MM-DD format (e.g., 2008-05-14).
    - If it's a Hijri date, format as YYYY-MM-DD using the Hijri year (e.g., 1429-05-14).
    - If no date is visible anywhere, return "NONE".
    
    SPECIAL RULES:
    - Normalize Arabic names intelligently: group variations like "محمد" and "المحمد" as the same person.
    - Tolerate OCR noise and imperfect text in scanned documents.
    
    CRITICAL: You must respond in JSON format. Your JSON must strictly contain exactly these fields:
    - "residents": list of strings
    - "category": string (MUST be one of the listed categories. If you cannot read the image or cannot classify it, you MUST use 'Miscellaneous Letters')
    - "date": string
    - "summary": string
  fields:
    - name: residents
      type: "list[str]"
      description: "List of resident names in Arabic, with relationship in parentheses if known (e.g. 'Name (Wife)'). Return ['NONE'] if no names."
    - name: category
      type: "str"
      description: "The document category. MUST be exactly one of: 'Basic Details Form', 'Personal Identification', 'Allocation Order', 'Key Handover Certificate', 'Housing Contract', 'Electricity and Water', 'Rent Deduction Notice', 'Allowance Deduction Notice', 'General Notifications', 'Maintenance Records', 'Inspection and Pictures', 'Property Modifications', 'Miscellaneous Letters'"
    - name: date
      type: "str"
      description: "The date of the document (Gregorian or Hijri) if visible, otherwise 'NONE'"
    - name: summary
      type: "str"
      description: "A verbose, one-line 'full story' of the page content, e.g., 'This letter from Ministry of Housing is for Mohamed Ali regarding a request to build an additional room.' Do not be lazy; extract all key context."

grouping:
  strategy: "python"
  script_path: "./scripts/sample-grouping.py"

routing:
  strategy: "python"
  fallback_folder: "UNKNOWN"
  script_path: "./scripts/sample-routing.py"
  destination_format: "{primary_tenant}/{category}"

cleaning:
  strategy: "hybrid"
  prompts:
    entity_resolution: |
      You are an expert at entity resolution for Bahrain housing documents.
      You will be given a list of 'Official Anchor Names' and a list of 'Other Names' (which include severe OCR typos and variations in both Arabic and English).
      Your task is to match each 'Other Name' to its correct 'Official Anchor Name'.
      CRITICAL RULES:
      1. Link English names to their Arabic counterparts if they represent the same person.
      2. If an 'Other Name' clearly refers to a completely different person (e.g. an inspector), match it to 'NONE'.
      3. Output YOUR RESPONSE EXACTLY as a list of mappings in plain text format:
      Other Name -> Official Anchor Name

      Example Output:
      YOUNIS MOHD. MAYAN -> YOUNIS MOHAMMED MALIK
      يونس محمد -> YOUNIS MOHAMMED MALIK
      ALI HASSAN -> NONE

      DO NOT output JSON. DO NOT output anything else except the mappings.
    date_outliers: |
      Analyze the following sequence of document dates. You are a chronological analysis expert. You will be given a list of page indices and their associated dates from a single document. Your task is to identify which dates are 'outliers'—meaning they do not belong to the primary chronological timeline of the document (e.g., a birth date from 1980 appearing in a document from 2024).

      CRITICAL RULES:
      1. Look for the main chronological 'chapters' of the document.
      2. A date is an outlier if it clearly belongs to a different life stage or event era than the rest of the sequence.
      3. Do NOT flag dates that show natural progression (e.g., 2021, 2022, 2023).
      4. Return ONLY a JSON object containing the 'outlier_page_indices' list.
    semantic_grouping: |
      You are a logical document grouping assistant

      CRITICAL RULES:
      1. You will be provided with an array of pages. Each page has [page_number, extracted_names, page_summary].
      2. Group consecutive pages together ONLY if they semantically belong to the exact same document/event.
      3. If a page starts a new document or a completely different topic, it belongs in a new group.
      4. A document can span multiple consecutive pages (e.g., a 5-page contract).
      5. Return a JSON object with a 'groups' field containing a list of lists of page numbers.
