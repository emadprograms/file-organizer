categories:
  - id: BASIC_DETAILS
    name: "Basic Details Form"
  - id: PERSONAL_DETAILS
    name: "Personal Identification"
  - id: AMAR_TAKHSEES
    name: "Allocation Order"
  - id: KEY_HANDOVER
    name: "Key Handover Certificate"
  - id: CONTRACT
    name: "Housing Contract"
  - id: EWA_LETTERS
    name: "Electricity and Water"
  - id: RENT_DEDUCTION
    name: "Rent Deduction Notice"
  - id: ALLOWANCE_DEDUCTION
    name: "Allowance Deduction Notice"
  - id: NOTIFICATIONS
    name: "General Notifications"
  - id: MAINTENANCE
    name: "Maintenance Records"
  - id: INSPECTION_PICTURES
    name: "Inspection and Pictures"
  - id: MODIFICATIONS
    name: "Property Modifications"
  - id: OTHER_LETTERS
    name: "Miscellaneous Letters"

extraction:
  prompt_template: "Extract residents, categories, and dates. Dates should be in YYYY-MM-DD format."
  fields:
    - name: residents
      type: "list[str]"
      description: "List of resident names in Arabic, with relationship in parentheses if known (e.g. 'Name (Wife)'). Return ['NONE'] if no names."
    - name: category
      type: "str"
      description: "The document category from the 13 defined types"
    - name: date
      type: "str"
      description: "The date of the document (Gregorian or Hijri) if visible, otherwise 'NONE'"
    - name: summary
      type: "str"
      description: "A verbose, one-line 'full story' of the page content, e.g., 'This letter from Ministry of Housing is for Mohamed Ali regarding a request to build an additional room.' Do not be lazy; extract all key context."

routing:
  destination_format: "{primary_tenant}/{category}"

cleaning:
  strategy: "llm"
  prompt_template: "Detect and remove outliers in dates based on document context. Then perform alias mapping to unify different spellings of the same resident name into a canonical primary tenant name."
